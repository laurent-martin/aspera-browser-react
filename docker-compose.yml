version: '3.8'

services:
  aspera-browser:
    build:
      context: .
      dockerfile: Dockerfile
    image: aspera-browser:latest
    container_name: aspera-browser
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - aspera-network

networks:
  aspera-network:
    driver: bridge

