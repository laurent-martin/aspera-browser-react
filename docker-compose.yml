version: '3.8'

# IMPORTANT: When using Podman rootless (non-root user), enable linger to persist
# containers after SSH logout:
#   sudo loginctl enable-linger $USER
# Without this, containers will stop when the user session ends.

services:
  aspera-browser:
    build:
      context: .
      dockerfile: Dockerfile
    image: aspera-browser:latest
    container_name: aspera-browser
    ports:
      - "11080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - aspera-network

networks:
  aspera-network:
    driver: bridge

