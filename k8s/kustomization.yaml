apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aspera-browser

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml

commonLabels:
  app: aspera-browser
  managed-by: kustomize

images:
  - name: aspera-browser
    newName: aspera-browser
    newTag: latest

