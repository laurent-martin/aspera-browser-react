apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspera-browser
  labels:
    app: aspera-browser
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aspera-browser
  template:
    metadata:
      labels:
        app: aspera-browser
        version: v1
    spec:
      containers:
      - name: aspera-browser
        image: aspera-browser:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: NODE_ENV
          value: "production"
      restartPolicy: Always

