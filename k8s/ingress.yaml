apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aspera-browser
  labels:
    app: aspera-browser
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - aspera-browser.example.com
    secretName: aspera-browser-tls
  rules:
  - host: aspera-browser.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aspera-browser
            port:
              number: 80

